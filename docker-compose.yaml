services:
  # PostgreSQL Database Service
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: myuser123
      POSTGRES_PASSWORD: 112233
      POSTGRES_DB: mydb123
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser123 -d mydb123"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build: ./backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://myuser123:112233@db:5432/mydb123
    depends_on:
      db:
        condition: service_healthy

  # React frontend
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: